<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="200" height="200" rx="40" fill="url(#grad1)" />

  <!-- Chart bars (growth / financial) -->
  <rect x="38" y="112" width="22" height="52" rx="6" fill="white" opacity="0.3"/>
  <rect x="68" y="88" width="22" height="76" rx="6" fill="white" opacity="0.5"/>
  <rect x="98" y="64" width="22" height="100" rx="6" fill="white" opacity="0.75"/>
  <rect x="128" y="44" width="22" height="120" rx="6" fill="white"/>

  <!-- Upward trend line -->
  <polyline points="49,108 79,84 109,60 139,40" stroke="#A78BFA" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Dot on top of trend -->
  <circle cx="139" cy="40" r="6" fill="white"/>

  <!-- Bottom label line -->
  <rect x="38" y="172" width="124" height="3" rx="1.5" fill="white" opacity="0.2"/>
</svg>
